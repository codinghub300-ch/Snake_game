```html
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Neon Snake Game</title>

<style>

body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:15px;
}

#menu{
    margin-top:20px;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

#gameCanvas{
    display:none;
    margin:auto;
    border:3px solid #00ffff;
    box-shadow:0 0 25px #00ffff;
}

#info{
    display:none;
    font-size:22px;
    margin:15px;
}

</style>

</head>

<body>

<h1>🐍 Neon Snake Game</h1>

<div id="menu">

<h2>Select Difficulty</h2>

<button onclick="startGame(150)">
Easy
</button>

<button onclick="startGame(100)">
Normal
</button>

<button onclick="startGame(70)">
Hard
</button>

</div>

<div id="info">

Score:
<span id="score">0</span>

|

High Score:
<span id="highscore">0</span>

</div>

<canvas
id="gameCanvas"
width="600"
height="600">
</canvas>

<script>

const canvas =
document.getElementById("gameCanvas");

const ctx =
canvas.getContext("2d");

const box = 20;

const colors = [
"#00ffff",
"#39ff14",
"#ffff00",
"#ff00ff",
"#ff8800",
"#00ff99",
"#ffffff"
];

let snake = [];
let food = {};

let direction = "RIGHT";

let score = 0;
let highScore = 0;

let gameLoop;
let speed = 100;

snake = [
{
x:10*box,
y:10*box,
color:"#00ffff"
}
];

const eatSound =
new Audio("eating.mp3");

const crashSound =
new Audio("crash.mp3");

const bgMusic =
new Audio("background.mp3");

bgMusic.loop = true;

function playEatSound(){

eatSound.pause();
eatSound.currentTime = 0;

eatSound.play().catch(()=>{});

}

function playCrashSound(){

crashSound.pause();
crashSound.currentTime = 0;

crashSound.play().catch(()=>{});

}

function startMusic(){

bgMusic.volume = 0.3;

bgMusic.play().catch(()=>{});

}

document.addEventListener(
"click",
function(){

startMusic();

},
{
once:true
}
);

function randomFood(){

food = {

x:
Math.floor(
Math.random()*30
)*box,

y:
Math.floor(
Math.random()*30
)*box

};

}

randomFood();

function startGame(selectedSpeed){

speed = selectedSpeed;

document.getElementById(
"menu"
).style.display="none";

document.getElementById(
"gameCanvas"
).style.display="block";

document.getElementById(
"info"
).style.display="block";

score = 0;

document.getElementById(
"score"
).innerHTML = score;

snake = [
{
x:10*box,
y:10*box,
color:"#00ffff"
}
];

direction = "RIGHT";

randomFood();

clearInterval(gameLoop);

gameLoop =
setInterval(
draw,
speed
);

}

document.addEventListener(
"keydown",
changeDirection
);

function changeDirection(event){

const key = event.keyCode;

if(key==37 && direction!="RIGHT"){
direction="LEFT";
}

else if(key==38 && direction!="DOWN"){
direction="UP";
}

else if(key==39 && direction!="LEFT"){
direction="RIGHT";
}

else if(key==40 && direction!="UP"){
direction="DOWN";
}

}

function draw(){

ctx.fillStyle="#0d1117";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.shadowBlur=20;
ctx.shadowColor="red";

ctx.fillStyle="red";

ctx.fillRect(
food.x,
food.y,
box,
box
);

for(let i=0;i<snake.length;i++){

ctx.shadowBlur=15;

ctx.shadowColor=
snake[i].color;

ctx.fillStyle=
snake[i].color;

ctx.fillRect(
snake[i].x,
snake[i].y,
box,
box
);

}

let snakeX =
snake[0].x;

let snakeY =
snake[0].y;

if(direction=="LEFT"){
snakeX -= box;
}

if(direction=="RIGHT"){
snakeX += box;
}

if(direction=="UP"){
snakeY -= box;
}

if(direction=="DOWN"){
snakeY += box;
}

if(
snakeX == food.x &&
snakeY == food.y
){

score += 10;

document.getElementById(
"score"
).innerHTML = score;

if(score > highScore){

highScore = score;

document.getElementById(
"highscore"
).innerHTML =
highScore;

}

playEatSound();

const lastSegment =
snake[
snake.length-1
];

snake.push({

x:lastSegment.x,
y:lastSegment.y,

color:
colors[
Math.floor(
Math.random()*colors.length
)
]

});

randomFood();

}else{

snake.pop();

}

let newHead = {

x:snakeX,
y:snakeY,
color:"#00ffff"

};

if(

snakeX < 0 ||

snakeX >= canvas.width ||

snakeY < 0 ||

snakeY >= canvas.height ||

collision(
newHead,
snake
)

){

gameOver();
return;

}

snake.unshift(
newHead
);

}

function collision(
head,
array
){

for(
let i=0;
i<array.length;
i++
){

if(
head.x==array[i].x &&
head.y==array[i].y
){

return true;

}

}

return false;

}

function gameOver(){

clearInterval(
gameLoop
);

playCrashSound();

setTimeout(() => {

snake = [
{
x:10*box,
y:10*box,
color:"#00ffff"
}
];

direction="RIGHT";

score=0;

document.getElementById(
"score"
).innerHTML = score;

randomFood();

gameLoop =
setInterval(
draw,
speed
);

},1500);

}

</script>

</body>
</html>
```
